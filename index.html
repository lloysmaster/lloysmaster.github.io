<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoDrone Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
    <h1 style="letter-spacing: 2px;">PicoDrone <span style="opacity: 0.5;">v1.0.4-STABLE</span></h1>
    <small style="color: var(--accent); font-size: 0.6rem;">LAT: 31°35'00.0 | LON: 59°53'00.0</small>
</div>
        
        <nav class="tab-navigation">
            <button class="tab-btn active" data-tab="tab-telemetria">Telemetría</button>
            <a href="https://github.com/lloysmaster/rp2040-drone" target="_blank" class="git-link">
                <button class="tab-btn git-btn">GitHub 📂</button>
            </a>
        </nav>

        <div class="header-controls">
            <button id="btnConectar" class="connect-btn">Conectar</button>
            <div class="input-group">
                <input type="text" id="inputEnviar" placeholder="Comando...">
                <button id="btnEnviar">Enviar</button>
            </div>
        </div>
    </header>

    <main class="tab-container">
        <section id="tab-telemetria" class="tab-content active">
            <div class="dashboard-grid">
                <div class="panel visualization-panel">
                    <div class="panel-header">Visualización de Actitud</div>
                    <div class="drone-views-container">
                        <div class="view-box">
                            <h4>Orientación Real</h4>
                            <div id="container3d"></div>
                        </div>
                        <div class="view-box">
                            <h4>Estado Motores</h4>
                            <div id="staticContainer3d"></div>
                        </div>
                    </div>
                </div>

                <div class="panel graph-panel">
                    <div class="panel-header">Gráfica en Tiempo Real</div>
                    <div class="canvas-container">
                        <canvas id="graficaRealTime"></canvas>
                    </div>
                </div>

                <div class="panel terminal-panel">
                    <div class="panel-header">Consola Serial</div>
                    <div id="terminal"></div>
                </div>

                <div class="panel pid-panel">
                    <div class="pid-header">
                        <h3>Configuración de Vuelo (PID)</h3>
                        <div class="pid-actions">
                            <button id="btnRefreshPID" class="cmd-btn">Sincronizar</button>
                            <button class="cmd-btn warn" onclick="">Test Motor</button>
                            <button class="cmd-btn danger" onclick="">Emergencia</button>
                        </div>
                    </div>
                    
                    <div class="pid-grid-expanded">
                        <div class="pid-row">
                            <span class="axis-label">ROLL</span>
                            <div class="slider-group">
                                <label>P: <span id="valRP">0</span> <input type="range" id="sliderRP" min="0" max="10" step="0.1"></label>
                                <label>I: <span id="valRI">0</span> <input type="range" id="sliderRI" min="0" max="5" step="0.01"></label>
                                <label>D: <span id="valRD">0</span> <input type="range" id="sliderRD" min="0" max="2" step="0.001"></label>
                            </div>
                        </div>
                        <div class="pid-row">
                            <span class="axis-label">PITCH</span>
                            <div class="slider-group">
                                <label>P: <span id="valPP">0</span> <input type="range" id="sliderPP" min="0" max="10" step="0.1"></label>
                                <label>I: <span id="valPI">0</span> <input type="range" id="sliderPI" min="0" max="5" step="0.01"></label>
                                <label>D: <span id="valPD">0</span> <input type="range" id="sliderPD" min="0" max="2" step="0.001"></label>
                            </div>
                        </div>
                        <div class="pid-row">
                            <span class="axis-label">YAW</span>
                            <div class="slider-group">
                                <label>P: <span id="valYP">0</span> <input type="range" id="sliderYP" min="0" max="10" step="0.1"></label>
                                <label>I: <span id="valYI">0</span> <input type="range" id="sliderYI" min="0" max="5" step="0.01"></label>
                                <label>D: <span id="valYD">0</span> <input type="range" id="sliderYD" min="0" max="2" step="0.001"></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        </main>

    <footer class="main-footer">
        <div class="footer-content">
            <span>Desarrollado por <strong>Facundo Alejo Barrio</strong></span>
            <span class="separator">|</span>
            <a href="#" class="footer-link" onclick="window.open('https://github.com/lloysmaster', '_blank')">github.com/lloysmaster</a>
        </div>
        <div class="status-indicator">
            <span class="dot"></span> RP2040 System Ready
        </div>
    </footer>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module" src="app.js"></script>
    </body>
</html>
